projects:
  
  alpaka:
    schema: http://jhnnsrs-lab/alpaka/schema
    documents: graphql/**/**.graphql
    extensions:
      turms:
        out_dir: alpaka/api
        exclude_typenames: true
        dump_configuration: true
        dump_schema: true
        freeze:
          enabled: true
        options:
          enabled: true
          allow_population_by_field_name: true
          use_enum_values: true
          extra: forbid
          types:
            - input
        stylers:
          - type: turms.stylers.default.DefaultStyler
          - type: turms.stylers.appender.AppenderStyler
            append_fragment: ""
        plugins:
          - type: turms.plugins.enums.EnumsPlugin
          - type: turms.plugins.inputs.InputsPlugin
          - type: turms.plugins.fragments.FragmentsPlugin
          - type: turms.plugins.operations.OperationsPlugin
          - type: turms.plugins.funcs.FuncsPlugin
            coercible_scalars:
              ID: rath.scalars.IDCoercible
            expand_input_types:
              - input
            global_kwargs:
              - type: alpaka.rath.AlpakaRath
                key: rath
                description:
                  The client we want to use (defaults to the currently active
                  client)
            definitions:
              - type: subscription
                is_async: true
                use: alpaka.funcs.asubscribe
              - type: query
                is_async: true
                use: alpaka.funcs.aexecute
              - type: mutation
                is_async: true
                use: alpaka.funcs.aexecute
              - type: subscription
                use: alpaka.funcs.subscribe
              - type: query
                use: alpaka.funcs.execute
              - type: mutation
                use: alpaka.funcs.execute
        scalar_definitions:
          uuid: str
          Callback: str
          Any: typing.Any
          JSON: typing.Any
          ID: rath.scalars.ID
          Base64EncodedString: str
        additional_bases:
          ChatResponse:
            - alpaka.traits.ChatResponseTraits
  