fragment Message on Message {
    id 
    text
    agent {
        id
        room {
            id
        }
    }
    room {
        id
        title
    }
    before {
        ...ListMessage
    }
    attachedStructures {
        object
        identifier
    }
}

fragment ListMessage on Message {
    id 
    text
    agent {
        id
    }
    attachedStructures {
        object
        identifier
    }
}