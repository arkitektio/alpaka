query GetRoom($id: ID!){
    room(id: $id){
        ...Room
    }
}
query SearchRooms(
  $search: String
  $values: [ID!]
  $limit: Int = 10
  $offset: Int = 0
) {
  options: rooms(
    filters: { search: $search, ids: $values }
    pagination: { limit: $limit, offset: $offset }
  ) {
    value: id
    label: title
    description: description
  }
}

query ListRooms(
  $filter: RoomFilter
  $order: [RoomOrder!]
  $pagination: OffsetPaginationInput
) {
  rooms(filters: $filter, ordering: $order, pagination: $pagination) {
    ...Room
  }
}