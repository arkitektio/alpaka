query GetMessage($id: ID!){
    message(id: $id){
        ...Message
    }
}
query SearchMessages(
  $search: String
  $values: [ID!]
  $limit: Int = 10
  $offset: Int = 0
) {
  options: messages(
    filters: { search: $search, ids: $values }
    pagination: { limit: $limit, offset: $offset }
  ) {
    value: id
    label: title
  }
}

query ListMessages(
  $filter: MessageFilter
  $order: [MessageOrder!]
  $pagination: OffsetPaginationInput
) {
  messages(filters: $filter, ordering: $order, pagination: $pagination) {
    ...ListMessage
  }
}
