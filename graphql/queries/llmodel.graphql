query GetLLMModel($id: ID!) {
  llmModel(id: $id) {
    ...LLMModel
  }
}

query SearchLLMModels(
  $search: String
  $values: [ID!]
  $limit: Int = 10
  $offset: Int = 0
) {
  options: llmModels(
    filters: { search: $search, ids: $values }
    pagination: { limit: $limit, offset: $offset }
  ) {
    value: id
    label: modelId
  }
}

query ListLLModels(
  $filter: LLMModelFilter
  $order: [LLMModelOrder!]
  $pagination: OffsetPaginationInput
) {
  llmModels(filters: $filter, ordering: $order, pagination: $pagination) {
    ...LLMModel
  }
}
