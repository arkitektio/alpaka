query GetChromaCollection($id: ID!) {
  chromaCollection(id: $id) {
    ...ChromaCollection
  }
}

query SearchChromaCollection(
  $search: String
  $values: [ID!]
  $limit: Int = 10
  $offset: Int = 0
) {
  options: chromaCollections(
    filters: { search: $search, ids: $values }
    pagination: { limit: $limit, offset: $offset }
  ) {
    value: id
    label: name
  }
}

query ListChromaCollections(
  $filter: ChromaCollectionFilter
  $order: [ChromaCollectionOrder!]
  $pagination: OffsetPaginationInput
) {
  chromaCollections(filters: $filter, ordering: $order, pagination: $pagination) {
    ...ChromaCollection
  }
}
